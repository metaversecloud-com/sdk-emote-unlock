# No clear secrets in git. Ciphertext only; the in-cluster sealed-secrets
# controller unseals it into Secret emunlock0-secrets (envFrom). Sealed (strict
# scope) against the dev cluster cert for namespace sdk-apps-dev.
# Re-seal:  kubeseal --cert sealed-secrets-dev.pem --format yaml \
#             --namespace sdk-apps-dev --name emunlock0-secrets < raw-secret.yaml
---
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: emunlock0-secrets
  namespace: sdk-apps-dev
spec:
  encryptedData:
    INTERACTIVE_SECRET: 
  template:
    metadata:
      name: emunlock0-secrets
      namespace: sdk-apps-dev
    type: Opaque
